<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>FORM</h1>
    <h3 class="xyz">NAME:</h3>
    <input class="xyz" placeholder="Enter your name" type="text"><br><br>

    <h3 class="xyz">Email:</h3>
    <input class="xyz" placeholder="Enter your name" type="email"><br><br>

    <div class="gender">
      <label>
        <input type="radio" name="gender" value="male">Male
      </label>

     <label>
        <input type="radio" name="gender" value="female">Female
      </label>
    </div>

    <br><br>

    <h3 class="xyz">City:</h3>
    <select name="City" class="xyz">
      <option>Kanpur</option>
      <option>Kannauj</option>
      <option>Mathura</option>
      <option>Agra</option>
    </select><br><br>

    <h3 class="xyz">Password:</h3>
    <input class="xyz" type="password" placeholder="Enter your password"><br><br>

    <button id="button" class="xyz">Submit</button>
  </div>
</body>
</html>
