<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            color: rgb(182, 182, 82);
        }   /* universal selector */

        h1{
            color: aquamarine;
        } /*element selector */

        #para{
             color: blue;
        }  /* id selector */

        .heading{
            color: brown;
        }  /* class selector */


        h2, h3, h4{
            color: rgb(72, 232, 14);
        } /* group selector */
    </style>
</head>
<body>
    <h1>Shivam Rajput</h1>
    <p id="para">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Itaque, odio!</p>
    <h1 class="heading">This is my pen.</h1>

    <p>Lorem ipsum dolor sit, amet consectetur adipisicing.</p>

    <h2>Manoj</h2>
    <h3>Anshul</h3>
    <h4>Aman Kumar</h4>
</body>
</html>
