<body>
    <form action="/server link" method="post">

       Price Range : <input type="range" required="false"><br><br>

       Gender : <br>

                <level for="female">Female : </level>
                <input type="radio" id="female" name="gender" value="female"><br>
                <level for="other">Other : </level>

                <lebel for="c">c</lebel>

                <lebel for="python">python</lebel>

                <lebel for="java">java</lebel>
                <input type="checkbox" name="lang" id="java">     <br> <br>      
       <button>Submit</button>
